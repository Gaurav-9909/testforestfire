<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#f4f4f4;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login{
            width:400px;
            margin:60px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        h2{
            text-align:center;
            margin-top:20px;
            color:green;
        }
    </style>
</head>

<body>

    <div class="login">

        <h1>FWI Prediction</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <input type="text" name="Temperature" placeholder="Temperature" required>

            <input type="text" name="RH" placeholder="Relative Humidity (RH)" required>

            <input type="text" name="Ws" placeholder="Wind Speed (Ws)" required>

            <input type="text" name="Rain" placeholder="Rain" required>

            <input type="text" name="FFMC" placeholder="FFMC" required>

            <input type="text" name="DMC" placeholder="DMC" required>

            <input type="text" name="ISI" placeholder="ISI" required>

            <input type="text" name="Classes" placeholder="Classes" required>

            <input type="text" name="Region" placeholder="Region" required>

            <button type="submit">Predict</button>

        </form>

        {% if result %}
            <h2>Predicted FWI: {{ result }}</h2>
        {% endif %}

    </div>

</body>
</html>
